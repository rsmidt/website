server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip_static on;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(?:css|js|svg|jpe?g|png|webp|woff2?|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    error_page 404 /404.html;
}
